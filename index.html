<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S3AS3</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #1a0a00;
  min-height: 100vh;
  overflow: hidden;
  font-family: monospace;
  cursor: none;
  image-rendering: pixelated;
}
#cursor {
  position: fixed;
  width: 12px; height: 12px;
  background: #fff;
  clip-path: polygon(0 0,50% 0,50% 30%,30% 30%,30% 50%,0 50%);
  pointer-events: none;
  z-index: 9999;
  image-rendering: pixelated;
}
#yt-bg {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none; overflow: hidden;
}
#yt-bg iframe {
  position: absolute; top: 50%; left: 50%;
  width: 177.78vh; height: 56.25vw;
  min-width: 100vw; min-height: 100vh;
  transform: translate(-50%, -50%);
  opacity: 0.55; border: none;
}
.overlay {
  position: fixed; inset: 0; z-index: 1;
  background: rgba(0,0,0,0.38); pointer-events: none;
}
#glass {
  position: fixed;
  width: 300px; height: 300px;
  pointer-events: none; z-index: 2;
  opacity: 0.15;
  transform: translate(-50%, -50%);
  image-rendering: pixelated;
  mix-blend-mode: screen;
  filter: blur(1.5px);
  transition: left 0.55s cubic-bezier(.25,.46,.45,.94), top 0.55s cubic-bezier(.25,.46,.45,.94);
}
#settings-btn {
  position: fixed; top: 16px; right: 16px; z-index: 10;
  background: none; border: none; cursor: none; padding: 0;
  transition: transform 0.15s;
}
#settings-btn:hover { transform: scale(1.1) rotate(22deg); }
#settings-btn img { width: 60px; height: 60px; image-rendering: pixelated; }
#app {
  position: relative; z-index: 3;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; gap: 0; padding: 20px;
}
#title-img {
  width: min(500px, 85vw);
  image-rendering: pixelated;
  margin-bottom: 36px;
  animation: titleFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(200,169,110,0.55));
}
@keyframes titleFloat {
  0%,100% { transform: translateY(0px); }
  50%      { transform: translateY(-9px); }
}
.menu-btn {
  background: none; border: none; cursor: none;
  padding: 0; margin: 5px 0; display: block;
  transition: transform 0.1s, filter 0.1s;
  image-rendering: pixelated;
}
.menu-btn img {
  width: min(370px, 70vw);
  image-rendering: pixelated; display: block;
}
.menu-btn:hover {
  transform: scale(1.07);
  filter: brightness(1.2) drop-shadow(0 0 14px rgba(255,180,80,0.75));
}
.menu-btn:active { transform: scale(0.96); }
#social-bar {
  position: fixed; bottom: 16px; left: 50%;
  transform: translateX(-50%); z-index: 10;
  display: flex; gap: 8px; align-items: center;
  background: rgba(0,0,0,0.6);
  border: 3px solid rgba(200,169,110,0.45);
  padding: 10px 14px;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 0 20px rgba(0,0,0,0.5);
}
.social-icon {
  width: 38px; height: 38px;
  image-rendering: pixelated;
  transition: transform 0.12s, filter 0.12s;
  cursor: none; display: block; object-fit: contain;
  border-radius: 0;
}
.social-icon:hover {
  transform: translateY(-5px) scale(1.18);
  filter: brightness(1.3) drop-shadow(0 4px 8px rgba(255,180,80,0.65));
}
#modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.78); z-index: 100;
  align-items: center; justify-content: center;
}
#modal-overlay.active { display: flex; }
#modal {
  background: #1e1005;
  border: 4px solid #c8a96e;
  padding: 36px 40px; max-width: 400px; width: 90%;
  text-align: center;
  clip-path: polygon(8px 0%,calc(100% - 8px) 0%,100% 8px,100% calc(100% - 8px),calc(100% - 8px) 100%,8px 100%,0% calc(100% - 8px),0% 8px);
  animation: popIn 0.2s ease;
  box-shadow: 0 0 40px rgba(200,169,110,0.25);
}
@keyframes popIn {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}
#modal h2 { color: #c8a96e; font-size: 1.4rem; letter-spacing: 0.12em; margin-bottom: 10px; }
#modal p  { color: #888; font-size: 0.9rem; margin-bottom: 22px; }
#modal-close {
  background: #c8a96e; color: #1e1005;
  border: none; padding: 10px 28px;
  font-size: 0.95rem; font-weight: 700; cursor: none;
  clip-path: polygon(4px 0%,calc(100% - 4px) 0%,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0% calc(100% - 4px),0% 4px);
  letter-spacing: 0.08em; transition: filter 0.1s;
}
#modal-close:hover { filter: brightness(1.2); }
@media (max-width: 500px) {
  #title-img { width: 88vw; margin-bottom: 20px; }
  .menu-btn img { width: 82vw; }
  .social-icon { width: 30px; height: 30px; }
  #social-bar { gap: 6px; padding: 8px 10px; bottom: 8px; }
  #settings-btn img { width: 46px; height: 46px; }
  #glass { width: 180px; height: 180px; }
}
</style>

<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});

const glass = document.getElementById('glass');
document.addEventListener('mousemove', e => {
  glass.style.left = e.clientX + 'px';
  glass.style.top  = e.clientY + 'px';
});

function openModal()  { document.getElementById('modal-overlay').classList.add('active'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('active'); }
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

function startGame() { alert('اللعبة قريباً!'); }
function openDevs()  { alert('المطورون: S3AS3 Team'); }
</script>
